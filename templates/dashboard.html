{% extends "layout.html" %}

{% block content %}

<h2>
    Welcome {{ username }}
</h2>

<div class="row">

    <div class="col-md-4">

        <div class="card p-3">

            <h4>
                Dataset Upload
            </h4>

            <a
            href="/upload"
            class="btn btn-primary">

                Upload CSV

            </a>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card p-3">

            <h4>
                Uploaded Files

            </a>

        </div>

    </div>

</div>

<a
href="/logout"
class="btn btn-danger mt-3">

Logout

</a>

{% endblock %}
