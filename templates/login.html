{% block content %}
<!DOCTYPE html>
<html>
<head>
    <title>PII Hashing System</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>
<div class="row justify-content-center">

    <div class="col-md-4">

        <div class="card">

            <div class="card-header">
                Login
            </div>

            <div class="card-body">
                <form method="POST">

                    <input
                    name="username"
                    class="form-control mb-3"
                    placeholder="Username">

                    <input
                    type="password"
                    name="password"
                    class="form-control mb-3"
                    placeholder="Password">

                    <button
                    class="btn btn-primary w-100">

                        Login

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
